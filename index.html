<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casio Layout</title>

    <!-- QUAN TRỌNG: link CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="calculator">
    <div class="screen"></div>

    <!-- ROW 1 -->
    <div class="row1">
        <button class="silver">SHIFT</button>
        <button class="silver">ALPHA</button>
        <button class="silver">↑</button>
        <button class="silver">MENU</button>
        <button class="silver">ON</button>

        <div></div>
        <button class="silver">←</button>
        <button class="silver">↓</button>
        <button class="silver">→</button>
        <div></div>
    </div>

    <!-- ROW 2 -->
    <div class="row2">
        <button>OPTN</button>
        <button>CALC</button>
        <div></div>
        <div></div>
        <button>∫𝑥
            <span> a to b</span>
        </button>
        <button>𝑥</button>

        <button>a/b</button>
        <button>√</button>
        <button>𝑥²</button>
        <button>𝑥^</button>
        <button>log a(b)</button>
        <button>ln</button>

        <button>(-)</button>
        <button>° ' "</button>
        <button>𝑥⁻¹</button>
        <button>sin</button>
        <button>cos</button>
        <button>tan</button>

        <button>STO</button>
        <button>ENG</button>
        <button>(</button>
        <button>)</button>
        <button>S↔D</button>
        <button>M+</button>
        <div></div>
    </div>

    <!-- ROW 3 -->
    <div class="row3">
        <button class="num">7</button>
        <button class="num">8</button>
        <button class="num">9</button>
        <button class="blue">DEL</button>
        <button class="blue">AC</button>

        <button class="num">4</button>
        <button class="num">5</button>
        <button class="num">6</button>
        <button>×</button>
        <button>÷</button>

        <button class="num">1</button>
        <button class="num">2</button>
        <button class="num">3</button>
        <button>+</button>
        <button>-</button>

        <button class="num">0</button>
        <button class="num">.</button>
        <button>x10^𝑥</button>
        <button>Ans</button>
        <button>=</button>
    </div>
</div>

</body>
</html>
